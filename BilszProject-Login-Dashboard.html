<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilszProject Dashboard - Growtopia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #030A15;
            --secondary-dark: #0A1428;
            --accent-blue: #1E88FF;
            --accent-purple: #6C4BFF;
            --accent-purple-light: #8D5BFF;
            --text-primary: #FFFFFF;
            --glow-cyan: #00D9FF;
            --glow-purple: #A855FF;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ==================== BACKGROUND ==================== */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #030A15 0%, #0A1428 50%, #0F0820 100%);
            z-index: -2;
        }

        .background::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(30, 136, 255, 0.12) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(108, 75, 255, 0.12) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
            z-index: -1;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, -50px); }
        }

        /* Mist Effect */
        .mist {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(108, 75, 255, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(30, 136, 255, 0.12) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: mistWave 25s ease-in-out infinite;
        }

        @keyframes mistWave {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.7), transparent);
            border-radius: 50%;
            animation: float-particle linear infinite;
            box-shadow: 0 0 6px rgba(0, 217, 255, 0.5);
        }

        @keyframes float-particle {
            0% { opacity: 0; transform: translateY(0px); }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100vh) translateX(80px); }
        }

        /* ==================== CONTAINER ==================== */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
        }

        /* ==================== HEADER ==================== */
        .header {
            position: absolute;
            top: 50px;
            text-align: center;
            z-index: 10;
            animation: slideDown 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 34px;
            box-shadow: 0 0 35px rgba(30, 136, 255, 0.5), 0 0 70px rgba(108, 75, 255, 0.25);
            position: relative;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -1px;
        }

        .logo::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.4), rgba(168, 85, 255, 0.3));
            border-radius: 16px;
            opacity: 0.6;
            z-index: -1;
            filter: blur(12px);
        }

        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 400;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* ==================== LOGIN CARD ==================== */
        .card {
            width: 440px;
            padding: 48px;
            border-radius: 20px;
            background: rgba(10, 20, 40, 0.65);
            backdrop-filter: blur(30px);
            border: 1.5px solid rgba(0, 217, 255, 0.25);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 20px rgba(255, 255, 255, 0.06),
                0 0 60px rgba(30, 136, 255, 0.12),
                0 0 120px rgba(108, 75, 255, 0.08);
            position: relative;
            animation: fadeIn 0.9s ease-out 0.15s backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.08) 0%, rgba(168, 85, 255, 0.04) 100%);
            pointer-events: none;
        }

        /* ==================== FORM CONTENT ==================== */
        .form-content {
            position: relative;
            z-index: 1;
        }

        .form-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .form-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.48);
            margin-bottom: 28px;
            font-weight: 500;
            letter-spacing: 0.4px;
            line-height: 1.5;
        }

        /* ==================== INPUT GROUPS ==================== */
        .input-group {
            margin-bottom: 18px;
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.38);
            z-index: 2;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 13px 16px 13px 48px;
            background: rgba(3, 10, 21, 0.75);
            border: 1.5px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            letter-spacing: 0.3px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
        }

        input:focus {
            border-color: var(--glow-cyan);
            background: rgba(3, 10, 21, 0.95);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.35), inset 0 0 25px rgba(0, 217, 255, 0.06);
        }

        input:focus + .input-icon {
            color: var(--glow-cyan);
        }

        /* ==================== PASSWORD TOGGLE ==================== */
        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.38);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            transition: all 0.25s ease;
            z-index: 3;
            padding: 0;
        }

        .password-toggle:hover {
            color: rgba(255, 255, 255, 0.7);
            transform: scale(1.1);
        }

        .password-toggle:active {
            transform: scale(0.95);
        }

        /* ==================== BUTTONS ==================== */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Space Grotesk', sans-serif;
            position: relative;
            overflow: hidden;
            height: 48px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.12);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        /* Login Button */
        .btn-login {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #1565C0 100%);
            color: white;
            box-shadow: 0 8px 28px rgba(30, 136, 255, 0.45);
        }

        .btn-login:hover {
            box-shadow: 0 12px 50px rgba(30, 136, 255, 0.65), 0 0 50px rgba(30, 136, 255, 0.35);
            transform: translateY(-3px);
        }

        .btn-login:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(30, 136, 255, 0.5);
        }

        /* Register Button */
        .btn-register {
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-purple-light) 100%);
            color: white;
            box-shadow: 0 8px 28px rgba(108, 75, 255, 0.45);
        }

        .btn-register:hover {
            box-shadow: 0 12px 50px rgba(108, 75, 255, 0.65), 0 0 50px rgba(168, 85, 255, 0.35);
            transform: translateY(-3px);
        }

        .btn-register:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(108, 75, 255, 0.5);
        }

        /* ==================== ICONS ==================== */
        .icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ==================== FOOTER ==================== */
        .footer-text {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .footer-link {
            color: var(--accent-blue);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .footer-link:hover {
            color: var(--glow-cyan);
            text-decoration: underline;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 600px) {
            .card {
                width: calc(100vw - 32px);
                padding: 36px 24px;
            }

            .title {
                font-size: 36px;
            }

            .button-group {
                flex-direction: column;
            }

            .header {
                top: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Layers -->
    <div class="background"></div>
    <div class="mist"></div>
    <div class="particles" id="particlesContainer"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header Section -->
        <div class="header">
        </div>

        <!-- Login Card -->
        <div class="card">
            <div class="form-content">
                <h2 class="form-title">BilszProject DashBoard</h2>
                <p class="form-subtitle">Enter your credentials to access your account</p>

                <!-- Username Input -->
                <div class="input-group">
                    <label class="input-label">GrowID</label>
                    <div class="input-wrapper">
                        <svg class="icon input-icon" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" placeholder="Username" id="username">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <svg class="icon input-icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" placeholder="Password" id="password">
                        <button class="password-toggle" id="togglePassword" type="button" title="Toggle password visibility">
                            <svg class="icon" viewBox="0 0 24 24" id="eyeIcon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button class="btn btn-login" id="loginBtn" title="Login to your account">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Login
                    </button>
                    <button class="btn btn-register" id="registerBtn" title="Create a new account">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <path d="M20 8v6M23 11h-6"></path>
                        </svg>
                        Register
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-text">
            © 2024 BilszProject • <a href="#" class="footer-link">Privacy</a>
        </div>
    </div>

    <script>
        // ==================== PASSWORD TOGGLE ====================
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';

            if (isPassword) {
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });

        // ==================== BUTTON INTERACTIONS ====================
        document.getElementById('loginBtn').addEventListener('click', () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username.trim() || !password.trim()) {
                alert('Silakan isi semua field');
                return;
            }
            alert(`Selamat datang, ${username}! 🎮`);
        });

        document.getElementById('registerBtn').addEventListener('click', () => {
            alert('Mengarahkan ke halaman registrasi... 📝');
        });

        // ==================== KEYBOARD SUPPORT ====================
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });

        // ==================== PARTICLE SYSTEM ====================
        const particlesContainer = document.getElementById('particlesContainer');

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';

            const x = Math.random() * window.innerWidth;
            const y = window.innerHeight + 10;
            const duration = 12 + Math.random() * 8;
            const delay = Math.random() * 3;

            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.animationDuration = duration + 's';
            particle.style.animationDelay = delay + 's';

            particlesContainer.appendChild(particle);

            setTimeout(() => particle.remove(), (duration + delay) * 1000);
        }

        // Create particles continuously
        setInterval(createParticle, 1200);

        // Create initial particles
        for (let i = 0; i < 3; i++) {
            setTimeout(() => createParticle(), i * 300);
        }
    </script>
</body>
</html>
